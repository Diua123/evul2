      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior-y: none;
        user-select: none;
      }
      /* Allow text selection in inputs and textareas */
      input, textarea {
        user-select: auto;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.18s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        from { transform: translateY(16px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slideUp {
        animation: slideUp 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes zoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-zoomIn {
        animation: zoomIn 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes swap1 {
        0%, 100% { transform: translateX(0); z-index: 1; }
        33% { transform: translateX(32px) scale(0.8); z-index: 0; }
        66% { transform: translateX(64px) scale(1.2); z-index: 2; }
      }
      @keyframes swap2 {
        0%, 100% { transform: translateX(0); z-index: 2; }
        33% { transform: translateX(32px) scale(1.2); z-index: 3; }
        66% { transform: translateX(-32px) scale(0.8); z-index: 0; }
      }
      @keyframes swap3 {
        0%, 100% { transform: translateX(0); z-index: 1; }
        33% { transform: translateX(-64px) scale(1.2); z-index: 2; }
        66% { transform: translateX(-32px) scale(0.8); z-index: 0; }
      }
      .animate-swap1 { animation: swap1 1.5s infinite ease-in-out; }
      .animate-swap2 { animation: swap2 1.5s infinite ease-in-out; }
      .animate-swap3 { animation: swap3 1.5s infinite ease-in-out; }
    </style>
